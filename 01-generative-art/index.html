<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Fable Works 01 — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #05070f; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif; }
  canvas {
    display: block;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #modes {
    position: fixed;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  #modes button {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(10,14,26,0.55);
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  #modes button.active {
    background: rgba(120,160,255,0.22);
    border-color: rgba(140,180,255,0.7);
    color: #fff;
  }
  #hint {
    position: fixed;
    left: 50%;
    bottom: 48px;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    letter-spacing: 0.05em;
    pointer-events: none;
    transition: opacity 1.2s;
    z-index: 10;
    white-space: nowrap;
  }
  #credit {
    position: fixed;
    right: 12px;
    bottom: 10px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 0.03em;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<nav id="modes"></nav>
<div id="hint">画面に触れると干渉できます</div>
<div id="credit">Made with Claude Code (Fable 5) — 2026-07</div>
<script>
'use strict';

// ---------- 基盤 ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;
let W = 0, H = 0;

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ポインタ（マウス／タッチ共通）
const pointer = { x: 0, y: 0, active: false };
canvas.addEventListener('pointerdown', e => {
  pointer.active = true;
  pointer.x = e.clientX;
  pointer.y = e.clientY;
});
canvas.addEventListener('pointermove', e => {
  pointer.x = e.clientX;
  pointer.y = e.clientY;
});
window.addEventListener('pointerup', () => { pointer.active = false; });
window.addEventListener('pointercancel', () => { pointer.active = false; });
// iOS Safari のスクロール・ズーム抑止
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ---------- Perlin ノイズ（3D） ----------
const perlin3 = (() => {
  const p = new Uint8Array(512);
  const perm = Array.from({ length: 256 }, (_, i) => i);
  let seed = 20260705;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(rnd() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + (b - a) * t;
  const grad = (h, x, y, z) => {
    h &= 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  };
  return (x, y, z) => {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
    x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
    const u = fade(x), v = fade(y), w = fade(z);
    const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
    const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
    return lerp(
      lerp(
        lerp(grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z), u),
        lerp(grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z), u), v),
      lerp(
        lerp(grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1), u),
        lerp(grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1), u), v),
      w);
  };
})();

// ---------- モード1: フローフィールド ----------
const flowField = {
  label: '流れ場',
  bg: '#05070f',
  pts: [],
  baseCount() { return Math.round(W * H / 420); },
  spawn() {
    return {
      x: Math.random() * W, y: Math.random() * H,
      px: 0, py: 0,
      hue: Math.floor(Math.random() * 12),
      life: 60 + Math.random() * 240,
    };
  },
  setCount(n) {
    const pts = this.pts;
    while (pts.length < n) pts.push(this.spawn());
    if (pts.length > n) pts.length = n;
  },
  init() {
    this.pts.length = 0;
    this.setCount(Math.round(this.baseCount() * quality));
  },
  frame(k, t) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(5,7,15,0.055)';
    ctx.fillRect(0, 0, W, H);

    const sc = 0.0014, tz = t * 0.00006;
    const paths = Array.from({ length: 12 }, () => new Path2D());
    const pr = 130, pr2 = pr * pr;

    for (const pt of this.pts) {
      pt.px = pt.x; pt.py = pt.y;
      const a = perlin3(pt.x * sc, pt.y * sc, tz) * TAU * 1.8;
      let vx = Math.cos(a) * 1.5, vy = Math.sin(a) * 1.5;
      if (pointer.active) {
        const dx = pt.x - pointer.x, dy = pt.y - pointer.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < pr2 && d2 > 1) {
          const d = Math.sqrt(d2);
          const f = (1 - d / pr) * 5;
          vx += (dx / d) * f;
          vy += (dy / d) * f;
        }
      }
      pt.x += vx * k;
      pt.y += vy * k;
      pt.life -= k;
      if (pt.life < 0 || pt.x < -5 || pt.x > W + 5 || pt.y < -5 || pt.y > H + 5) {
        Object.assign(pt, this.spawn());
        continue;
      }
      const path = paths[pt.hue];
      path.moveTo(pt.px, pt.py);
      path.lineTo(pt.x, pt.y);
    }
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineWidth = 1;
    for (let b = 0; b < 12; b++) {
      ctx.strokeStyle = `hsla(${185 + b * 13}, 85%, 62%, 0.45)`;
      ctx.stroke(paths[b]);
    }
  },
};

// ---------- モード2: Boids（群れ） ----------
const boids = {
  label: '群れ',
  bg: '#05070f',
  pts: [],
  baseCount() { return Math.min(320, Math.round(W * H / 3200)); },
  spawn() {
    const a = Math.random() * TAU;
    return {
      x: Math.random() * W, y: Math.random() * H,
      vx: Math.cos(a) * 2, vy: Math.sin(a) * 2,
    };
  },
  setCount(n) {
    const pts = this.pts;
    while (pts.length < n) pts.push(this.spawn());
    if (pts.length > n) pts.length = n;
  },
  init() {
    this.pts.length = 0;
    this.setCount(Math.round(this.baseCount() * quality));
  },
  frame(k) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(5,7,15,0.28)';
    ctx.fillRect(0, 0, W, H);

    const pts = this.pts;
    const CELL = 56;
    const cols = Math.max(1, Math.ceil(W / CELL));
    const grid = new Map();
    for (let i = 0; i < pts.length; i++) {
      const b = pts[i];
      const key = Math.floor(b.x / CELL) + Math.floor(b.y / CELL) * cols;
      const cell = grid.get(key);
      if (cell) cell.push(b); else grid.set(key, [b]);
    }

    const R = 52, R2 = R * R, SEP = 22, SEP2 = SEP * SEP;
    const MAXV = 2.8, FLEE = 170, FLEE2 = FLEE * FLEE;
    const paths = Array.from({ length: 12 }, () => new Path2D());

    for (const b of pts) {
      let cx = 0, cy = 0, ax = 0, ay = 0, sx = 0, sy = 0, n = 0;
      const gx = Math.floor(b.x / CELL), gy = Math.floor(b.y / CELL);
      for (let ox = -1; ox <= 1; ox++) {
        for (let oy = -1; oy <= 1; oy++) {
          const cell = grid.get(gx + ox + (gy + oy) * cols);
          if (!cell) continue;
          for (const o of cell) {
            if (o === b) continue;
            const dx = o.x - b.x, dy = o.y - b.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > R2) continue;
            cx += o.x; cy += o.y;
            ax += o.vx; ay += o.vy;
            n++;
            if (d2 < SEP2 && d2 > 0.01) {
              sx -= dx / d2; sy -= dy / d2;
            }
          }
        }
      }
      let fx = 0, fy = 0;
      if (n > 0) {
        fx += ((cx / n) - b.x) * 0.0045;          // 結合
        fy += ((cy / n) - b.y) * 0.0045;
        fx += ((ax / n) - b.vx) * 0.055;          // 整列
        fy += ((ay / n) - b.vy) * 0.055;
        fx += sx * 14; fy += sy * 14;             // 分離
      }
      if (pointer.active) {
        const dx = b.x - pointer.x, dy = b.y - pointer.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < FLEE2 && d2 > 1) {
          const d = Math.sqrt(d2);
          const f = (1 - d / FLEE) * 0.9;
          fx += (dx / d) * f;
          fy += (dy / d) * f;
        }
      }
      b.vx += fx * k;
      b.vy += fy * k;
      const sp = Math.hypot(b.vx, b.vy);
      if (sp > MAXV) { b.vx = b.vx / sp * MAXV; b.vy = b.vy / sp * MAXV; }
      else if (sp < 0.8 && sp > 0.001) { b.vx = b.vx / sp * 0.8; b.vy = b.vy / sp * 0.8; }
      b.x += b.vx * k;
      b.y += b.vy * k;
      // 画面端でラップ
      if (b.x < -10) b.x += W + 20; else if (b.x > W + 10) b.x -= W + 20;
      if (b.y < -10) b.y += H + 20; else if (b.y > H + 10) b.y -= H + 20;

      // 進行方向の三角形を描く（色は向きで決まる）
      const ang = Math.atan2(b.vy, b.vx);
      const hueIdx = ((Math.round(ang / TAU * 12) % 12) + 12) % 12;
      const dx = Math.cos(ang), dy = Math.sin(ang);
      const path = paths[hueIdx];
      path.moveTo(b.x + dx * 7, b.y + dy * 7);
      path.lineTo(b.x - dx * 4 - dy * 3.2, b.y - dy * 4 + dx * 3.2);
      path.lineTo(b.x - dx * 4 + dy * 3.2, b.y - dy * 4 - dx * 3.2);
      path.closePath();
    }
    for (let b = 0; b < 12; b++) {
      ctx.fillStyle = `hsla(${150 + b * 18}, 75%, 62%, 0.95)`;
      ctx.fill(paths[b]);
    }
  },
};

// ---------- モード3: 重力銀河 ----------
const galaxy = {
  label: '銀河',
  bg: '#04060e',
  pts: [],
  baseCount() { return Math.round(W * H / 340); },
  spawn() {
    const cx = W / 2, cy = H / 2;
    const rMax = Math.min(W, H) * 0.46;
    // 指数<0.5で外側寄りの分布にする（0.5=一様密度）
    const r = 40 + Math.pow(Math.random(), 0.35) * rMax;
    const a = Math.random() * TAU;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    // ほぼ円軌道の初速（±6%の揺らぎで楕円に）
    const G = this.G, s = this.soft;
    const accel = G * r / Math.pow(r * r + s, 1.5);
    const v = Math.sqrt(Math.max(accel * r, 0.0001)) * (0.94 + Math.random() * 0.12);
    return { x, y, vx: -Math.sin(a) * v, vy: Math.cos(a) * v };
  },
  G: 13000,
  soft: 1200,
  setCount(n) {
    const pts = this.pts;
    while (pts.length < n) pts.push(this.spawn());
    if (pts.length > n) pts.length = n;
  },
  init() {
    this.pts.length = 0;
    this.setCount(Math.round(this.baseCount() * quality));
  },
  frame(k) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(4,6,14,0.16)';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    const G = this.G, s = this.soft;
    const PG = 30000, PS = 900;
    const NB = 14;
    const buckets = this._buckets || (this._buckets = Array.from({ length: NB }, () => []));
    for (const b of buckets) b.length = 0;

    for (const p of this.pts) {
      let dx = cx - p.x, dy = cy - p.y;
      let d2 = dx * dx + dy * dy;
      let inv = G / Math.pow(d2 + s, 1.5);
      p.vx += dx * inv * k;
      p.vy += dy * inv * k;
      if (pointer.active) {
        dx = pointer.x - p.x; dy = pointer.y - p.y;
        d2 = dx * dx + dy * dy;
        inv = PG / Math.pow(d2 + PS, 1.5);
        p.vx += dx * inv * k;
        p.vy += dy * inv * k;
      }
      p.x += p.vx * k;
      p.y += p.vy * k;
      // 遠くへ飛んだ粒子は作り直す
      if (p.x < -W * 0.5 || p.x > W * 1.5 || p.y < -H * 0.5 || p.y > H * 1.5) {
        Object.assign(p, this.spawn());
      }
      const sp = Math.hypot(p.vx, p.vy);
      let idx = Math.floor((sp - 5.5) * 2.4);
      if (idx < 0) idx = 0; else if (idx >= NB) idx = NB - 1;
      buckets[idx].push(p.x, p.y);
    }
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < NB; i++) {
      const arr = buckets[i];
      if (!arr.length) continue;
      // 遅い(外縁)=青 → 紫 → 速い(中心付近)=琥珀。緑を通らない経路で回す
      const f = i / (NB - 1);
      const hue = (210 + f * 195) % 360;
      const light = 48 + f * 38;
      ctx.fillStyle = `hsla(${hue}, ${90 - f * 25}%, ${light}%, 0.9)`;
      for (let j = 0; j < arr.length; j += 2) {
        ctx.fillRect(arr[j], arr[j + 1], 2.2, 2.2);
      }
    }
    // 中心のコア
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 26);
    grd.addColorStop(0, 'rgba(255,240,210,0.20)');
    grd.addColorStop(1, 'rgba(255,240,210,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(cx - 26, cy - 26, 52, 52);
  },
};

// ---------- モード管理・メインループ ----------
const MODES = [flowField, boids, galaxy];
let mode = MODES[0];
let quality = 1;  // 0.25〜1。フレーム時間で自動調整

const nav = document.getElementById('modes');
MODES.forEach((m, i) => {
  const btn = document.createElement('button');
  btn.textContent = m.label;
  btn.addEventListener('click', () => switchMode(i));
  nav.appendChild(btn);
});
function updateButtons() {
  [...nav.children].forEach((b, i) => b.classList.toggle('active', MODES[i] === mode));
}
function switchMode(i) {
  mode = MODES[i];
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = mode.bg;
  ctx.fillRect(0, 0, W, H);
  mode.init();
  updateButtons();
}

// リサイズ（連続発火をデバウンス）
let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resizeCanvas();
    switchMode(MODES.indexOf(mode));
  }, 180);
});

// タブ非表示中は止め、復帰時に dt が暴れないようにする
let last = performance.now();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) last = performance.now();
});

// パフォーマンス自動調整
let emaDt = 16.7, frames = 0;
function tunePerformance(dt) {
  emaDt = emaDt * 0.95 + dt * 0.05;
  if (++frames % 60 !== 0) return;
  if (emaDt > 26 && quality > 0.25) {
    quality = Math.max(0.25, quality * 0.85);
    mode.setCount(Math.round(mode.baseCount() * quality));
  } else if (emaDt < 15 && quality < 1) {
    quality = Math.min(1, quality * 1.08);
    mode.setCount(Math.round(mode.baseCount() * quality));
  }
}

function loop(now) {
  requestAnimationFrame(loop);
  if (document.hidden) return;
  let dt = now - last;
  last = now;
  if (dt <= 0 || dt > 100) dt = 16.7;
  tunePerformance(dt);
  const k = Math.min(dt, 33) / 16.7;  // 物理の時間スケール
  mode.frame(k, now);
}

// ヒントは数秒で消す
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);

resizeCanvas();
switchMode(0);
requestAnimationFrame(loop);
</script>
</body>
</html>
